<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        body.light {
            background-color: white;
            color: black;
        }
        body.dark {
            background-color: #333;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body class="light">
    <div class="container">
        <h1>Welcome to Our Landing Page</h1>
        <p>This is a simple demo of a landing page with dark and light theme toggle.</p>
        <button id="theme-toggle">Switch to Dark Theme</button>
    </div>
    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const body = document.body;

        toggleButton.addEventListener('click', () => {
            if (body.classList.contains('light')) {
                body.classList.remove('light');
                body.classList.add('dark');
                toggleButton.textContent = 'Switch to Light Theme';
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                toggleButton.textContent = 'Switch to Dark Theme';
            }
        });
    </script>
</body>
</html>
